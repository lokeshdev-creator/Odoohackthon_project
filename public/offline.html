<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – TransitOps</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #090d16;
      color: #f8fafc;
      font-family: system-ui, -apple-system, sans-serif;
      gap: 24px;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #0284c7, #0ea5e9);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    h1 { font-size: 1.75rem; font-weight: 800; }
    p { color: #94a3b8; max-width: 360px; line-height: 1.6; }
    button {
      padding: 12px 28px;
      background: #0ea5e9;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #0284c7; }
    .badge {
      padding: 4px 12px;
      background: rgba(14,165,233,0.15);
      border: 1px solid rgba(14,165,233,0.3);
      border-radius: 20px;
      font-size: 0.75rem;
      color: #38bdf8;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="icon">🚛</div>
  <div class="badge">No Connection</div>
  <h1>You're offline</h1>
  <p>
    TransitOps needs an internet connection to load live fleet data.
    Please check your network and try again.
  </p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
